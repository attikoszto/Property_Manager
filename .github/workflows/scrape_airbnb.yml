name: scrape-airbnb-data

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run listing scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/scrape_listings.py

      - name: Run availability scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/scrape_availability.py

      - name: Run price scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/scrape_prices.py

      - name: Ingest weather forecasts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/ingest_weather.py
